<svg fill="none" viewBox="0 0 800 320" width="800" height="320" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        *{margin:0;padding:0;box-sizing:border-box}
        .s{width:800px;height:320px;background:#06080f;position:relative;overflow:hidden;font-family:'Courier New',monospace}

        /* ── AI CORE / EYE ── */
        .core-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2}

        /* Outer scanning rings */
        .scan-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:1px solid}
        .sr1{width:280px;height:280px;border-color:rgba(0,200,255,0.06);animation:scan-r 8s linear infinite}
        .sr2{width:230px;height:230px;border-color:rgba(0,200,255,0.08);animation:scan-r 6s linear infinite reverse}
        .sr3{width:180px;height:180px;border-color:rgba(0,200,255,0.1);animation:scan-r 5s linear infinite}
        .sr4{width:130px;height:130px;border-color:rgba(0,200,255,0.12);animation:scan-r 4s linear infinite reverse}
        .sr5{width:80px;height:80px;border-color:rgba(0,200,255,0.15);animation:scan-r 3s linear infinite}

        @keyframes scan-r{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}

        /* Ring markers (dots on rings) */
        .ring-mark{position:absolute;width:4px;height:4px;border-radius:50%;background:#00c8ff;box-shadow:0 0 6px #00c8ff}
        .rm1{top:0;left:50%;transform:translateX(-50%)}
        .rm2{bottom:0;left:50%;transform:translateX(-50%)}
        .rm3{top:50%;right:0;transform:translateY(-50%)}

        /* Scanning beam from ring */
        .scan-beam{position:absolute;top:50%;left:50%;width:50%;height:1px;transform-origin:left center;background:linear-gradient(90deg,rgba(0,200,255,0.3),transparent);z-index:2}
        .sb1{animation:beam-sweep 8s linear infinite}
        .sb2{animation:beam-sweep 6s linear infinite;width:40%;background:linear-gradient(90deg,rgba(0,200,255,0.2),transparent)}
        @keyframes beam-sweep{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

        /* Inner eye */
        .eye{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;border-radius:50%;z-index:3;
          background:radial-gradient(circle,#00e5ff 0%,#0088cc 30%,#004466 60%,transparent 70%);
          box-shadow:0 0 30px rgba(0,200,255,0.5),0 0 60px rgba(0,200,255,0.2),0 0 100px rgba(0,200,255,0.1);
          animation:eye-pulse 3s ease-in-out infinite}
        @keyframes eye-pulse{0%,100%{transform:translate(-50%,-50%) scale(1);box-shadow:0 0 30px rgba(0,200,255,0.5),0 0 60px rgba(0,200,255,0.2)}50%{transform:translate(-50%,-50%) scale(1.15);box-shadow:0 0 40px rgba(0,200,255,0.6),0 0 80px rgba(0,200,255,0.3),0 0 120px rgba(0,200,255,0.1)}}

        /* Pupil */
        .pupil{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:#06080f;z-index:4;
          box-shadow:inset 0 0 5px rgba(0,200,255,0.5)}

        /* ── DATA CONVERGENCE STREAMS ── */
        .dstream{position:absolute;z-index:1;overflow:hidden}
        .ds-inner{font-size:8px;color:rgba(0,200,255,0.15);white-space:nowrap;letter-spacing:2px;animation:ds-flow linear infinite}

        .ds1{top:25%;left:0;width:250px;height:12px;transform:rotate(8deg)}.ds1 .ds-inner{animation-duration:6s}
        .ds2{top:45%;left:0;width:200px;height:12px;transform:rotate(3deg)}.ds2 .ds-inner{animation-duration:8s;animation-delay:1s}
        .ds3{top:65%;left:0;width:230px;height:12px;transform:rotate(-5deg)}.ds3 .ds-inner{animation-duration:7s;animation-delay:0.5s}
        .ds4{top:20%;right:0;width:250px;height:12px;transform:rotate(-8deg);text-align:right}.ds4 .ds-inner{animation-duration:6s;animation-delay:2s;animation-name:ds-flow-r}
        .ds5{top:50%;right:0;width:200px;height:12px;transform:rotate(-2deg)}.ds5 .ds-inner{animation-duration:9s;animation-delay:1.5s;animation-name:ds-flow-r}
        .ds6{top:70%;right:0;width:220px;height:12px;transform:rotate(6deg)}.ds6 .ds-inner{animation-duration:7s;animation-delay:0.8s;animation-name:ds-flow-r}

        @keyframes ds-flow{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
        @keyframes ds-flow-r{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

        /* ── ATTENTION BEAMS (from edges to center) ── */
        .attn{position:absolute;height:1px;z-index:1;opacity:0}
        .attn-l{left:0;transform-origin:right center;background:linear-gradient(90deg,transparent,rgba(0,200,255,0.2))}
        .attn-r{right:0;transform-origin:left center;background:linear-gradient(90deg,rgba(0,200,255,0.2),transparent)}

        .a1{top:30%;width:280px;animation:attn-fire 4s ease-in-out infinite}
        .a2{top:50%;width:300px;animation:attn-fire 4s ease-in-out 1s infinite}
        .a3{top:70%;width:260px;animation:attn-fire 4s ease-in-out 2s infinite}
        .a4{top:25%;width:270px;animation:attn-fire 4s ease-in-out 0.5s infinite}
        .a5{top:55%;width:290px;animation:attn-fire 4s ease-in-out 1.5s infinite}
        .a6{top:75%;width:250px;animation:attn-fire 4s ease-in-out 2.5s infinite}

        @keyframes attn-fire{0%,70%,100%{opacity:0;transform:scaleX(0.3)}80%{opacity:0.6;transform:scaleX(1)}90%{opacity:0;transform:scaleX(1)}}

        /* ── TOKEN PARTICLES flowing to center ── */
        .token{position:absolute;width:3px;height:3px;border-radius:50%;background:#00c8ff;z-index:2;opacity:0}
        .t1{top:20%;left:5%;animation:tok-fly 3s ease-in infinite}
        .t2{top:40%;left:8%;animation:tok-fly 4s ease-in 0.5s infinite}
        .t3{top:60%;left:3%;animation:tok-fly 3.5s ease-in 1s infinite}
        .t4{top:80%;left:10%;animation:tok-fly 4.5s ease-in 1.5s infinite}
        .t5{top:15%;right:5%;animation:tok-fly-r 3s ease-in 0.3s infinite}
        .t6{top:45%;right:8%;animation:tok-fly-r 4s ease-in 0.8s infinite}
        .t7{top:65%;right:3%;animation:tok-fly-r 3.5s ease-in 1.3s infinite}
        .t8{top:85%;right:10%;animation:tok-fly-r 4.5s ease-in 1.8s infinite}

        .t2,.t4,.t6,.t8{background:#7b68ee;width:2px;height:2px}

        @keyframes tok-fly{0%{opacity:0;transform:translate(0,0)}20%{opacity:0.8}80%{opacity:0.3}100%{opacity:0;transform:translate(350px,-20px)}}
        @keyframes tok-fly-r{0%{opacity:0;transform:translate(0,0)}20%{opacity:0.8}80%{opacity:0.3}100%{opacity:0;transform:translate(-350px,20px)}}

        /* ── AMBIENT ── */
        .amb{position:absolute;width:100%;height:100%;z-index:1;
          background:radial-gradient(ellipse 300px 300px at 50% 50%,rgba(0,200,255,0.06) 0%,transparent 70%)}

        .vig{position:absolute;width:100%;height:100%;background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,0.8) 100%);z-index:3;pointer-events:none}

        /* ── CONTENT ── */
        .ct{position:relative;z-index:6;display:flex;flex-direction:column;align-items:center;justify-content:center;height:320px}

        .ai-label{font-size:10px;letter-spacing:6px;text-transform:uppercase;color:rgba(0,200,255,0.35);margin-bottom:8px;animation:label-in 1s 0.3s both}
        @keyframes label-in{from{opacity:0;letter-spacing:15px}to{opacity:1;letter-spacing:6px}}

        .nm{font-size:44px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:#fff;
          text-shadow:0 0 20px rgba(0,200,255,0.3),0 0 50px rgba(0,200,255,0.1);
          animation:nm-in 1s 0.8s both}
        @keyframes nm-in{from{opacity:0;filter:blur(10px);transform:scale(0.95)}to{opacity:1;filter:blur(0);transform:scale(1)}}

        .role{margin-top:10px;font-size:13px;letter-spacing:3px;text-transform:uppercase;padding:6px 18px;position:relative;animation:fade-in 0.8s 1.8s both}
        @keyframes fade-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

        .role-text{background:linear-gradient(90deg,#00c8ff,#7b68ee,#00e5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% 100%;animation:grad-shift 4s linear infinite}
        @keyframes grad-shift{0%{background-position:0 0}100%{background-position:200% 0}}

        .role::before{content:'';position:absolute;inset:0;border:1px solid rgba(0,200,255,0.15);animation:br-pulse 3s ease-in-out infinite}
        @keyframes br-pulse{0%,100%{border-color:rgba(0,200,255,0.1)}50%{border-color:rgba(0,200,255,0.3);box-shadow:0 0 12px rgba(0,200,255,0.05)}}

        .sub{margin-top:12px;font-size:11px;color:#00c8ff;overflow:hidden;white-space:nowrap;border-right:2px solid #00c8ff;width:0;opacity:0;
          animation:fade-in 0.01s 2.5s forwards,sub-type 2.2s steps(45) 2.5s forwards,blink-c 0.6s step-end 2.5s 4,cursor-off 0.01s 5s forwards;letter-spacing:1px}
        @keyframes sub-type{to{width:50ch}}
        @keyframes blink-c{50%{border-color:transparent}}
        @keyframes cursor-off{to{border-color:transparent}}

        .tags{margin-top:14px;display:flex;gap:16px;font-size:9px;letter-spacing:2px;color:rgba(0,200,255,0.2);animation:fade-in 1s 3.5s both;align-items:center}
        .tag-on{color:#00ffaa;font-weight:700;font-size:10px;letter-spacing:3px;padding:4px 14px;border:1px solid rgba(0,255,170,0.4);background:rgba(0,255,170,0.08);position:relative;animation:otw-pulse 2s ease-in-out infinite}
        @keyframes otw-pulse{0%,100%{border-color:rgba(0,255,170,0.4);box-shadow:0 0 8px rgba(0,255,170,0.1),0 0 20px rgba(0,255,170,0.05)}50%{border-color:rgba(0,255,170,0.7);box-shadow:0 0 12px rgba(0,255,170,0.25),0 0 30px rgba(0,255,170,0.1)}}
        .td{display:inline-block;width:6px;height:6px;border-radius:50%;background:#00ffaa;margin-right:6px;vertical-align:middle;animation:td-p 1.5s ease-in-out infinite;box-shadow:0 0 6px #00ffaa}
        @keyframes td-p{0%,100%{box-shadow:0 0 6px #00ffaa,0 0 12px rgba(0,255,170,0.3);opacity:1}50%{box-shadow:0 0 3px #00ffaa;opacity:0.4}}

        .bb{position:absolute;bottom:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,#00c8ff,#7b68ee,#00e5ff,#7b68ee,#00c8ff,transparent);background-size:300% 100%;animation:bb-g 3s linear infinite;z-index:7}
        @keyframes bb-g{0%{background-position:0 0}100%{background-position:300% 0}}
      </style>

      <div class="s">
        <div class="amb"></div>

        <!-- AI Core -->
        <div class="core-wrap">
          <div class="scan-ring sr1"><div class="ring-mark rm1"></div></div>
          <div class="scan-ring sr2"><div class="ring-mark rm2"></div></div>
          <div class="scan-ring sr3"><div class="ring-mark rm3"></div></div>
          <div class="scan-ring sr4"><div class="ring-mark rm1"></div><div class="ring-mark rm3"></div></div>
          <div class="scan-ring sr5"></div>
          <div class="scan-beam sb1"></div>
          <div class="scan-beam sb2"></div>
          <div class="eye"></div>
          <div class="pupil"></div>
        </div>

        <!-- Data streams -->
        <div class="dstream ds1"><div class="ds-inner">EMBEDDING VECTOR 0.982 TOKEN_ID:4821 ATTN:0.97 LAYER:24 FFN RESIDUAL NORM SOFTMAX</div></div>
        <div class="dstream ds2"><div class="ds-inner">PROMPT CONTEXT WINDOW 128K CHAIN_OF_THOUGHT RETRIEVAL AUGMENTED GENERATION</div></div>
        <div class="dstream ds3"><div class="ds-inner">AGENT.EXECUTE TOOL_CALL OBSERVATION REASONING PLANNING ACTION FEEDBACK LOOP</div></div>
        <div class="dstream ds4"><div class="ds-inner">TRANSFORMER MULTI_HEAD SELF_ATTENTION Q*K^T/SQRT(D) POSITIONAL ENCODING</div></div>
        <div class="dstream ds5"><div class="ds-inner">VECTOR_STORE COSINE_SIMILARITY TOP_K RERANK CONTEXT_INJECTION COMPLETION</div></div>
        <div class="dstream ds6"><div class="ds-inner">FUNCTION_CALL PARAMETERS SCHEMA VALIDATION RESPONSE STREAMING DELTA</div></div>

        <!-- Attention beams -->
        <div class="attn attn-l a1"></div><div class="attn attn-l a2"></div><div class="attn attn-l a3"></div>
        <div class="attn attn-r a4"></div><div class="attn attn-r a5"></div><div class="attn attn-r a6"></div>

        <!-- Token particles -->
        <div class="token t1"></div><div class="token t2"></div><div class="token t3"></div><div class="token t4"></div>
        <div class="token t5"></div><div class="token t6"></div><div class="token t7"></div><div class="token t8"></div>

        <div class="vig"></div>

        <div class="ct">
          <div class="ai-label">engineering + artificial intelligence</div>
          <div class="nm">Kajetan Kisielewski</div>
          <div class="role"><span class="role-text">Full-stack Developer &#xB7; AI Integration Specialist</span></div>
          <div class="sub">I ship platforms. Then I make them think.</div>
          <div class="tags">
            <span class="tag-on"><span class="td"></span>OPEN TO WORK</span>
            <span>3+ YRS</span>
            <span>WARSAW</span>
          </div>
        </div>

        <div class="bb"></div>
      </div>
    </div>
  </foreignObject>
</svg>
